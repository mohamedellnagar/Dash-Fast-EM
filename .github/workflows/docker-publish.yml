name: Build and publish Docker image

# Builds the app image on GitHub's runners and pushes it to Docker Hub, so the
# deploy target only ever pulls a prebuilt image (no source checkout, no build
# on the server). Runs on every push to main, or manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # `latest` for the deploy target to pull, plus an immutable
          # commit-sha tag so a bad deploy can be rolled back precisely.
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dash-fast-em:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dash-fast-em:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
